{% extends 'base.html' %}
{% block title %}Sign Up — ResumeIQ{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-bg-effects">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card glass-card animate-fade-in">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="auth-logo">
                    <i class="fas fa-bolt"></i> Resume<span>IQ</span>
                </a>
                <h2>Create Account</h2>
                <p>Start analyzing your resume with AI</p>
            </div>
            <form method="POST" action="{{ url_for('signup') }}" class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-shield-alt"></i> Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login') }}">Log in here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('password').addEventListener('input', function() {
    const strength = document.getElementById('passwordStrength');
    const val = this.value;
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
    const colors = ['', '#ff4444', '#ffaa00', '#ffdd00', '#77dd77', '#00d4ff'];
    
    if (val.length === 0) {
        strength.innerHTML = '';
    } else {
        strength.innerHTML = `<div class="strength-bar"><div class="strength-fill" style="width:${score*20}%;background:${colors[score]}"></div></div><span style="color:${colors[score]}">${labels[score]}</span>`;
    }
});
</script>
{% endblock %}
