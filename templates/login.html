{% extends 'base.html' %}
{% block title %}Login — ResumeIQ{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-bg-effects">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card glass-card animate-fade-in">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="auth-logo">
                    <i class="fas fa-bolt"></i> Resume<span>IQ</span>
                </a>
                <h2>Welcome Back</h2>
                <p>Log in to access your dashboard</p>
            </div>
            <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Log In
                </button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a></p>
            </div>
            <div class="auth-demo-info glass-card">
                <p><i class="fas fa-info-circle"></i> <strong>Demo Admin:</strong> admin@resumeiq.com / admin123</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
